name: Windows verification

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      amkr_wheel_url:
        description: Pinned compatible AMKR wheel URL
        required: true
        type: string
      amkr_wheel_sha256:
        description: SHA-256 of the compatible AMKR wheel
        required: true
        type: string

env:
  PYTHON_VERSION: 3.12.10
  PYTHON_EMBED_SHA256: 4acbed6dd1c744b0376e3b1cf57ce906f9dc9e95e68824584c8099a63025a3c3
  AMKR_WHEEL_URL: ${{ inputs.amkr_wheel_url || vars.AMKR_WHEEL_URL }}
  AMKR_WHEEL_SHA256: ${{ inputs.amkr_wheel_sha256 || vars.AMKR_WHEEL_SHA256 }}

jobs:
  verify-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test -- --run
      - run: cargo test
        working-directory: src-tauri
      - run: npm run build
      - run: npm run test:e2e

      - name: Prepare pinned private runtime
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          if (-not $env:AMKR_WHEEL_URL -or -not $env:AMKR_WHEEL_SHA256) {
            throw 'Set AMKR_WHEEL_URL and AMKR_WHEEL_SHA256 repository variables for tag builds.'
          }
          if ($env:AMKR_WHEEL_SHA256 -cnotmatch '^[0-9a-f]{64}$') {
            throw 'AMKR_WHEEL_SHA256 must be 64 lowercase hexadecimal characters.'
          }
          $root = Join-Path $PWD '.release-runtime'
          $wheelhouse = Join-Path $root 'wheelhouse'
          New-Item -ItemType Directory -Path $wheelhouse -Force | Out-Null
          $archive = Join-Path $root "python-$env:PYTHON_VERSION-embed-amd64.zip"
          Invoke-WebRequest "https://www.python.org/ftp/python/$env:PYTHON_VERSION/python-$env:PYTHON_VERSION-embed-amd64.zip" -OutFile $archive
          python -m pip download --disable-pip-version-check --only-binary=:all: --dest $wheelhouse $env:AMKR_WHEEL_URL
          if ($LASTEXITCODE -ne 0) { throw 'AMKR wheelhouse download failed' }
          $wheels = @(Get-ChildItem $wheelhouse -Filter 'auto_model_key_router-*.whl')
          if ($wheels.Count -ne 1) { throw "Expected one AMKR wheel, found $($wheels.Count)" }
          $wheel = $wheels[0].FullName
          ./scripts/prepare-amkr-runtime.ps1 `
            -PythonEmbedArchive $archive `
            -PythonArchiveSha256 $env:PYTHON_EMBED_SHA256 `
            -AmkrWheel $wheel `
            -AmkrWheelSha256 $env:AMKR_WHEEL_SHA256 `
            -WheelhouseDirectory $wheelhouse `
            -RuntimeOutputDirectory 'src-tauri/runtime-bundle/runtime' `
            -InstallStateOutputPath 'src-tauri/runtime-bundle/install-state.json'

      - name: Verify NSIS contracts
        shell: pwsh
        run: |
          ./tests/nsis-contract.ps1

      - name: Verify private runtime contracts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: ./tests/installer-smoke.ps1 -RuntimeDirectory 'src-tauri/runtime-bundle/runtime' -InstallStatePath 'src-tauri/runtime-bundle/install-state.json'

      - name: Build unsigned NSIS verification artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: npx tauri build --bundles nsis --ci --no-sign

      - name: Record installer SHA-256
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe')
          if ($installers.Count -ne 1) { throw "Expected one NSIS installer, found $($installers.Count)" }
          $installer = $installers[0]
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "$($installer.FullName).sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          name: keyloom-windows-x64-unsigned
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*.sha256
