name: Verify and release Keyloom

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test -- --run
      - run: cargo test
        working-directory: src-tauri
      - run: npm run build
      - run: npm run test:e2e
      - name: Verify native Windows contracts
        shell: pwsh
        run: ./tests/windows-subsystem-contract.ps1
      - name: Verify release version contract
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF_NAME } else { '' }
          ./tests/release-version-contract.ps1 -Tag $tag
      - name: Verify NSIS contracts
        shell: pwsh
        run: |
          ./tests/nsis-contract.ps1

      - name: Require updater signing keys for tagged releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          KEYLOOM_UPDATER_PUBLIC_KEY: ${{ vars.KEYLOOM_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if (-not $env:KEYLOOM_UPDATER_PUBLIC_KEY -or -not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw 'Tagged releases require KEYLOOM_UPDATER_PUBLIC_KEY and TAURI_SIGNING_PRIVATE_KEY.'
          }

      - name: Build NSIS release artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          KEYLOOM_UPDATER_PUBLIC_KEY: ${{ vars.KEYLOOM_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tagged = $env:GITHUB_REF -like 'refs/tags/v*'
          $bundle = @{ createUpdaterArtifacts = $tagged }
          $configObject = @{ bundle = $bundle }
          if ($tagged) {
            $configObject.plugins = @{ updater = @{
              pubkey = $env:KEYLOOM_UPDATER_PUBLIC_KEY
              endpoints = @("https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/latest.json")
              windows = @{ installMode = 'passive' }
            } }
          }
          $config = $configObject | ConvertTo-Json -Depth 8 -Compress
          $arguments = @('tauri', 'build', '--bundles', 'nsis', '--ci', '--config', $config)
          if (-not $tagged) { $arguments += '--no-sign' }
          & npx @arguments
          if ($LASTEXITCODE -ne 0) { throw 'NSIS release build failed.' }

      - name: Verify packaged Windows subsystem
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: ./tests/windows-subsystem-contract.ps1 -ExecutablePath 'src-tauri/target/release/keyloom-core.exe'

      - name: Record installer SHA-256
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe')
          if ($installers.Count -ne 1) { throw "Expected one NSIS installer, found $($installers.Count)" }
          $installer = $installers[0]
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "$($installer.FullName).sha256" -Encoding ascii

      - name: Generate signed updater manifest
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $bundleDirectory = 'src-tauri/target/release/bundle/nsis'
          $installers = @(Get-ChildItem $bundleDirectory -Filter '*-setup.exe')
          if ($installers.Count -ne 1) { throw "Expected one NSIS updater installer, found $($installers.Count)" }
          $installer = $installers[0]
          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) { throw "Missing updater signature: $signaturePath" }
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $manifest = @{
            version = [string]$package.version
            notes = "Keyloom $($package.version)"
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = @{
              'windows-x86_64' = @{
              signature = (Get-Content $signaturePath -Raw).Trim()
              url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/$($installer.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content (Join-Path $bundleDirectory 'latest.json') -Encoding utf8

      - name: Report installer signature status
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $installer = @(Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe')[0]
          $signature = Get-AuthenticodeSignature $installer.FullName
          Write-Output "installer_signature_status=$($signature.Status)"

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          name: keyloom-windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*.sha256
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*.sha256
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
