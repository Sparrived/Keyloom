name: Verify and release Keyloom

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      amkr_wheel_url:
        description: Pinned compatible AMKR wheel URL
        required: true
        type: string
      amkr_wheel_sha256:
        description: SHA-256 of the compatible AMKR wheel
        required: true
        type: string

env:
  PYTHON_VERSION: 3.12.10
  PYTHON_EMBED_SHA256: 4acbed6dd1c744b0376e3b1cf57ce906f9dc9e95e68824584c8099a63025a3c3
  AMKR_WHEEL_URL: ${{ inputs.amkr_wheel_url || vars.AMKR_WHEEL_URL }}
  AMKR_WHEEL_SHA256: ${{ inputs.amkr_wheel_sha256 || vars.AMKR_WHEEL_SHA256 }}

jobs:
  verify-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test -- --run
      - run: cargo test
        working-directory: src-tauri
      - run: npm run build
      - run: npm run test:e2e
      - name: Verify native Windows contracts
        shell: pwsh
        run: ./tests/windows-subsystem-contract.ps1
      - name: Verify release version contract
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF_NAME } else { '' }
          ./tests/release-version-contract.ps1 -Tag $tag
      - name: Verify runtime packaging contracts
        shell: pwsh
        run: ./tests/runtime-contract.ps1

      - name: Prepare pinned private runtime
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          if (-not $env:AMKR_WHEEL_URL -or -not $env:AMKR_WHEEL_SHA256) {
            throw 'Set AMKR_WHEEL_URL and AMKR_WHEEL_SHA256 repository variables for tag builds.'
          }
          if ($env:AMKR_WHEEL_SHA256 -cnotmatch '^[0-9a-f]{64}$') {
            throw 'AMKR_WHEEL_SHA256 must be 64 lowercase hexadecimal characters.'
          }
          $root = Join-Path $PWD '.release-runtime'
          $wheelhouse = Join-Path $root 'wheelhouse'
          New-Item -ItemType Directory -Path $wheelhouse -Force | Out-Null
          $archive = Join-Path $root "python-$env:PYTHON_VERSION-embed-amd64.zip"
          Invoke-WebRequest "https://www.python.org/ftp/python/$env:PYTHON_VERSION/python-$env:PYTHON_VERSION-embed-amd64.zip" -OutFile $archive
          python -m pip download --disable-pip-version-check --only-binary=:all: --dest $wheelhouse $env:AMKR_WHEEL_URL
          if ($LASTEXITCODE -ne 0) { throw 'AMKR wheelhouse download failed' }
          $wheels = @(Get-ChildItem $wheelhouse -Filter 'auto_model_key_router-*.whl')
          if ($wheels.Count -ne 1) { throw "Expected one AMKR wheel, found $($wheels.Count)" }
          $wheel = $wheels[0].FullName
          python -m pip download --disable-pip-version-check --only-binary=:all: --dest $wheelhouse "$($wheel)[visitor]"
          if ($LASTEXITCODE -ne 0) { throw 'AMKR visitor wheelhouse download failed' }
          python -m pip download --disable-pip-version-check --only-binary=:all: --dest $wheelhouse 'pip==25.0.1'
          if ($LASTEXITCODE -ne 0) { throw 'Pinned runtime updater download failed' }
          ./scripts/prepare-amkr-runtime.ps1 `
            -PythonEmbedArchive $archive `
            -PythonArchiveSha256 $env:PYTHON_EMBED_SHA256 `
            -AmkrWheel $wheel `
            -AmkrWheelSha256 $env:AMKR_WHEEL_SHA256 `
            -WheelhouseDirectory $wheelhouse `
            -RuntimeOutputDirectory 'src-tauri/runtime-bundle/runtime' `
            -InstallStateOutputPath 'src-tauri/runtime-bundle/install-state.json'

      - name: Verify NSIS contracts
        shell: pwsh
        run: |
          ./tests/nsis-contract.ps1

      - name: Verify private runtime contracts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: ./tests/installer-smoke.ps1 -RuntimeDirectory 'src-tauri/runtime-bundle/runtime' -InstallStatePath 'src-tauri/runtime-bundle/install-state.json'

      - name: Require signing certificate for tagged releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          KEYLOOM_WINDOWS_CERTIFICATE: ${{ secrets.KEYLOOM_WINDOWS_CERTIFICATE }}
          KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD }}
          KEYLOOM_UPDATER_PUBLIC_KEY: ${{ vars.KEYLOOM_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if (-not $env:KEYLOOM_WINDOWS_CERTIFICATE -or -not $env:KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD) {
            throw 'Tagged releases require KEYLOOM_WINDOWS_CERTIFICATE and KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD.'
          }
          if (-not $env:KEYLOOM_UPDATER_PUBLIC_KEY -or -not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw 'Tagged releases require KEYLOOM_UPDATER_PUBLIC_KEY and TAURI_SIGNING_PRIVATE_KEY.'
          }

      - name: Import Windows signing certificate
        id: signing
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          KEYLOOM_WINDOWS_CERTIFICATE: ${{ secrets.KEYLOOM_WINDOWS_CERTIFICATE }}
          KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'keyloom-signing.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:KEYLOOM_WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:KEYLOOM_WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate.Thumbprint) { throw 'Windows signing certificate import failed.' }
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Build NSIS release artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          CERTIFICATE_THUMBPRINT: ${{ steps.signing.outputs.thumbprint }}
          KEYLOOM_UPDATER_PUBLIC_KEY: ${{ vars.KEYLOOM_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tagged = $env:GITHUB_REF -like 'refs/tags/v*'
          $bundle = @{ createUpdaterArtifacts = $tagged }
          if ($env:CERTIFICATE_THUMBPRINT) {
            $bundle.windows = @{ certificateThumbprint = $env:CERTIFICATE_THUMBPRINT; digestAlgorithm = 'sha256'; timestampUrl = 'http://timestamp.digicert.com' }
          }
          $configObject = @{ bundle = $bundle }
          if ($tagged) {
            $configObject.plugins = @{ updater = @{
              pubkey = $env:KEYLOOM_UPDATER_PUBLIC_KEY
              endpoints = @("https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/latest.json")
              windows = @{ installMode = 'passive' }
            } }
          }
          $config = $configObject | ConvertTo-Json -Depth 8 -Compress
          $arguments = @('tauri', 'build', '--bundles', 'nsis', '--ci', '--config', $config)
          if (-not $tagged) { $arguments += '--no-sign' }
          & npx @arguments
          if ($LASTEXITCODE -ne 0) { throw 'NSIS release build failed.' }

      - name: Verify packaged Windows subsystem
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: ./tests/windows-subsystem-contract.ps1 -ExecutablePath 'src-tauri/target/release/keyloom-core.exe'

      - name: Record installer SHA-256
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe')
          if ($installers.Count -ne 1) { throw "Expected one NSIS installer, found $($installers.Count)" }
          $installer = $installers[0]
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "$($installer.FullName).sha256" -Encoding ascii

      - name: Generate signed updater manifest
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $bundleDirectory = 'src-tauri/target/release/bundle/nsis'
          $archives = @(Get-ChildItem $bundleDirectory -Filter '*.nsis.zip')
          if ($archives.Count -ne 1) { throw "Expected one NSIS updater archive, found $($archives.Count)" }
          $archive = $archives[0]
          $signaturePath = "$($archive.FullName).sig"
          if (-not (Test-Path $signaturePath)) { throw "Missing updater signature: $signaturePath" }
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $manifest = @{
            version = [string]$package.version
            notes = "Keyloom $($package.version)"
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = @{
              'windows-x86_64' = @{
                signature = (Get-Content $signaturePath -Raw).Trim()
                url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/$($archive.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content (Join-Path $bundleDirectory 'latest.json') -Encoding utf8

      - name: Verify release signature and record smoke report
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $installer = @(Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe')[0]
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ('${{ startsWith(github.ref, 'refs/tags/v') }}' -eq 'true' -and $signature.Status -ne 'Valid') {
            throw "Tagged installer signature is invalid: $($signature.StatusMessage)"
          }
          ./tests/installer-smoke.ps1 `
            -RuntimeDirectory 'src-tauri/runtime-bundle/runtime' `
            -InstallStatePath 'src-tauri/runtime-bundle/install-state.json' |
            Out-File 'src-tauri/target/release/bundle/nsis/runtime-smoke.txt' -Encoding utf8

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          name: keyloom-windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*.sha256
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/nsis/runtime-smoke.txt

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*.sha256
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/nsis/runtime-smoke.txt
